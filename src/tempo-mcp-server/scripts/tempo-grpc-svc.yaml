apiVersion: v1
kind: Service
metadata:
  name: tempo-grpc
  namespace: tempo
spec:
  type: ClusterIP
  ports:
    - name: grpc-plugin
      port: 7777
      protocol: TCP
      targetPort: 9095
  selector:
    app.kubernetes.io/component: query-frontend
    app.kubernetes.io/instance: tempo
    app.kubernetes.io/name: tempo
