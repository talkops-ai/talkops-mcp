# ─────────────────────────────────────────────────────────────────────────────
# TalkOps MCP Server — PyPI Release Pipeline
# ─────────────────────────────────────────────────────────────────────────────
# Trigger: Push a tag like  prometheus-mcp-server/v0.2.0
# Result:  Build → Test → Publish to PyPI → GitHub Release with artifacts
# ─────────────────────────────────────────────────────────────────────────────

name: "📦 Release to PyPI"

on:
  push:
    tags:
      # Matches tags like: prometheus-mcp-server/v0.1.0, helm-mcp-server/v0.2.0
      - "*/v*"

# Cancel in-flight runs for the same tag
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write        # GitHub Releases
  id-token: write        # PyPI Trusted Publishers (OIDC)

# ─────────────────────────────────────────────────────────────────────────────
# Reusable metadata extracted from the git tag
# ─────────────────────────────────────────────────────────────────────────────
jobs:
  # ── Step 1: Parse the tag and validate ──────────────────────────────────
  meta:
    name: "🏷️ Parse Release Tag"
    runs-on: ubuntu-latest
    outputs:
      server_name: ${{ steps.parse.outputs.server_name }}
      version: ${{ steps.parse.outputs.version }}
      server_dir: ${{ steps.parse.outputs.server_dir }}
      pypi_name: ${{ steps.parse.outputs.pypi_name }}
    steps:
      - name: Parse tag
        id: parse
        run: |
          TAG="${GITHUB_REF#refs/tags/}"
          # Tag format: <server-name>/v<version>
          SERVER_NAME="${TAG%/v*}"
          VERSION="${TAG#*/v}"

          echo "server_name=${SERVER_NAME}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "server_dir=src/${SERVER_NAME}" >> "$GITHUB_OUTPUT"
          echo "pypi_name=talkops-${SERVER_NAME}" >> "$GITHUB_OUTPUT"

          echo "📦 Server: ${SERVER_NAME}"
          echo "🏷️  Version: ${VERSION}"
          echo "📁 Directory: src/${SERVER_NAME}"
          echo "🐍 PyPI name: talkops-${SERVER_NAME}"

      - uses: actions/checkout@v4

      - name: Validate version matches pyproject.toml
        run: |
          TOML_VERSION=$(grep '^version' "${{ steps.parse.outputs.server_dir }}/pyproject.toml" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          TAG_VERSION="${{ steps.parse.outputs.version }}"
          if [ "$TOML_VERSION" != "$TAG_VERSION" ]; then
            echo "❌ Version mismatch! pyproject.toml=${TOML_VERSION} tag=${TAG_VERSION}"
            exit 1
          fi
          echo "✅ Version match: ${TAG_VERSION}"

  # ── Step 2: Run tests ──────────────────────────────────────────────────
  test:
    name: "🧪 Test"
    needs: meta
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ needs.meta.outputs.server_dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync --dev

      - name: Run tests
        run: |
          if [ -d "tests" ] && [ "$(find tests -name 'test_*.py' -o -name '*_test.py' | head -1)" ]; then
            uv run pytest tests/ -v --tb=short
          else
            echo "⚠️  No tests found — skipping"
          fi

  # ── Step 3: Build sdist + wheel ────────────────────────────────────────
  build:
    name: "🔨 Build"
    needs: [meta, test]
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ${{ needs.meta.outputs.server_dir }}
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v6
        with:
          version: "latest"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Build package
        run: uv build

      - name: Verify built artifacts
        run: |
          echo "📦 Built artifacts:"
          ls -lh dist/
          # Verify the version in the filenames
          VERSION="${{ needs.meta.outputs.version }}"
          if ! ls dist/*${VERSION}* 1>/dev/null 2>&1; then
            echo "❌ No artifacts found with version ${VERSION}"
            exit 1
          fi
          echo "✅ Artifacts verified"

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: dist-${{ needs.meta.outputs.server_name }}
          path: ${{ needs.meta.outputs.server_dir }}/dist/
          retention-days: 5

  # ── Step 4: Publish to PyPI ────────────────────────────────────────────
  publish-pypi:
    name: "🚀 Publish to PyPI"
    needs: [meta, build]
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/project/${{ needs.meta.outputs.pypi_name }}/
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.meta.outputs.server_name }}
          path: dist/

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        # Uses Trusted Publishers (OIDC) — no API token needed in secrets
        # Fallback: set PYPI_API_TOKEN in repository secrets
        with:
          # Uncomment the next line to use API token instead of Trusted Publishers:
          # password: ${{ secrets.PYPI_API_TOKEN }}
          packages-dir: dist/
          verbose: true
          print-hash: true

  # ── Step 5: Create GitHub Release ──────────────────────────────────────
  github-release:
    name: "📋 GitHub Release"
    needs: [meta, build, publish-pypi]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # Full history for changelog generation

      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          name: dist-${{ needs.meta.outputs.server_name }}
          path: dist/

      - name: Generate release notes
        id: notes
        env:
          SERVER_NAME: ${{ needs.meta.outputs.server_name }}
          SERVER_DIR: ${{ needs.meta.outputs.server_dir }}
          PYPI_NAME: ${{ needs.meta.outputs.pypi_name }}
          VERSION: ${{ needs.meta.outputs.version }}
        run: |
          set -euo pipefail

          # ── Extract metadata from pyproject.toml ──
          TOML="${SERVER_DIR}/pyproject.toml"
          DESCRIPTION=$(grep '^description' "$TOML" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          PYTHON_REQ=$(grep 'requires-python' "$TOML" | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo ">=3.12")
          LICENSE=$(grep -A1 '^\[project\]' "$TOML" | grep 'license' | head -1 | sed 's/.*"\(.*\)".*/\1/' || echo "Apache-2.0")

          # ── Extract dependencies ──
          DEPS=$(sed -n '/^dependencies/,/^\[/p' "$TOML" | grep '"' | sed 's/.*"\(.*\)".*/\1/' | head -10)
          DEPS_LIST=""
          while IFS= read -r dep; do
            [ -z "$dep" ] && continue
            # Extract just the package name (before any version specifier)
            PKG_NAME=$(echo "$dep" | sed 's/[><=!;].*//' | xargs)
            DEPS_LIST="${DEPS_LIST}\n| \`${PKG_NAME}\` | \`${dep}\` |"
          done <<< "$DEPS"

          # ── Count available MCP tools ──
          TOOL_COUNT=0
          if [ -d "${SERVER_DIR}" ]; then
            TOOL_COUNT=$(grep -r '^\s*async def [a-z]' "${SERVER_DIR}" --include="*_tools.py" 2>/dev/null \
              | grep -v '__\|_register\|setup\|_helper\|_build\|_parse\|_validate\|_format\|_coerce\|_ensure' \
              | wc -l | xargs || echo "0")
          fi

          # ── Extract environment variables from Dockerfile ──
          ENV_TABLE=""
          DOCKERFILE="${SERVER_DIR}/Dockerfile"
          if [ -f "$DOCKERFILE" ]; then
            # Get ENV lines after the "Application" comment block (skip build-stage ENVs)
            ENV_VARS=$(awk '/^ENV MCP_SERVER_NAME/,0' "$DOCKERFILE" | grep '^ENV ' | grep -v 'UV_\|PIP_\|PATH=' | sed 's/ENV //' | sed 's/ *\\//')
            while IFS= read -r line; do
              [ -z "$line" ] && continue
              VAR_NAME=$(echo "$line" | cut -d'=' -f1)
              VAR_DEFAULT=$(echo "$line" | cut -d'=' -f2-)
              ENV_TABLE="${ENV_TABLE}\n| \`${VAR_NAME}\` | \`${VAR_DEFAULT}\` |"
            done <<< "$ENV_VARS"
          fi

          # ── Generate artifact checksums ──
          CHECKSUMS=""
          for f in dist/*; do
            HASH=$(sha256sum "$f" | cut -d' ' -f1)
            FNAME=$(basename "$f")
            CHECKSUMS="${CHECKSUMS}\n| \`${FNAME}\` | \`${HASH:0:16}…\` |"
          done

          # ── Determine previous tag for changelog ──
          PREV_TAG=$(git tag --list "${SERVER_NAME}/v*" --sort=-version:refname | grep -v "v${VERSION}" | head -1 || true)
          CHANGELOG=""
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log --oneline "${PREV_TAG}..HEAD" -- "${SERVER_DIR}" 2>/dev/null | head -15)
            if [ -n "$COMMITS" ]; then
              CHANGELOG="### 📝 Changes since \`${PREV_TAG}\`\n\n"
              while IFS= read -r commit; do
                [ -z "$commit" ] && continue
                CHANGELOG="${CHANGELOG}- ${commit}\n"
              done <<< "$COMMITS"
            fi
          fi

          # ── Compose the release body ──
          cat > /tmp/release_body.md << RELEASE_EOF
          ## 📦 ${PYPI_NAME} v${VERSION}

          > ${DESCRIPTION}

          ---

          ### ⚡ Quick Start

          \`\`\`bash
          # Install via pip
          pip install ${PYPI_NAME}==${VERSION}

          # Install via uv (recommended)
          uv pip install ${PYPI_NAME}==${VERSION}

          # Run instantly without installing
          uvx ${PYPI_NAME}
          \`\`\`

          ---

          ### 🔌 MCP Client Configuration

          **Claude Desktop / Cursor / Windsurf** — add to your \`mcp.json\`:
          \`\`\`json
          {
            "mcpServers": {
              "${SERVER_NAME}": {
                "command": "uvx",
                "args": ["${PYPI_NAME}"]
              }
            }
          }
          \`\`\`

          **HTTP Mode** (for remote agents / multi-tenant setups):
          \`\`\`bash
          MCP_TRANSPORT=http PORT=8767 ${SERVER_NAME}
          \`\`\`

          ---

          ### 🛠 Available Tools

          This server exposes **${TOOL_COUNT}** MCP tools. See the [full documentation](https://github.com/talkops-ai/talkops-mcp/tree/main/src/${SERVER_NAME}#tools) for details.

          ---

          ### ⚙️ Environment Variables

          | Variable | Default |
          |----------|---------|$(echo -e "${ENV_TABLE}")

          ---

          $(echo -e "${CHANGELOG}")

          ### 📋 Package Details

          | | |
          |---|---|
          | **PyPI** | [\`${PYPI_NAME}\`](https://pypi.org/project/${PYPI_NAME}/${VERSION}/) |
          | **Version** | \`${VERSION}\` |
          | **Python** | \`${PYTHON_REQ}\` |
          | **License** | ${LICENSE} |
          | **Transport** | stdio (default), HTTP, SSE |

          <details>
          <summary>📦 Dependencies</summary>

          | Package | Requirement |
          |---------|-------------|$(echo -e "${DEPS_LIST}")

          </details>

          <details>
          <summary>🔒 Artifact Checksums (SHA-256)</summary>

          | File | SHA-256 (truncated) |
          |------|---------------------|$(echo -e "${CHECKSUMS}")

          </details>

          ---

          ### 🔗 Links

          - 📦 [PyPI Package](https://pypi.org/project/${PYPI_NAME}/${VERSION}/)
          - 📖 [Documentation](https://github.com/talkops-ai/talkops-mcp/tree/main/src/${SERVER_NAME})
          - 🐳 [Docker Image](https://github.com/talkops-ai/talkops-mcp/tree/main/src/${SERVER_NAME}/Dockerfile)
          - 🐛 [Report an Issue](https://github.com/talkops-ai/talkops-mcp/issues/new?labels=${SERVER_NAME}&title=[${SERVER_NAME}]+v${VERSION}:+)
          RELEASE_EOF

          # Remove leading whitespace from heredoc indentation
          sed -i 's/^          //' /tmp/release_body.md

          echo "✅ Release notes generated"
          cat /tmp/release_body.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.meta.outputs.server_name }}/v${{ needs.meta.outputs.version }}
          name: "${{ needs.meta.outputs.server_name }} v${{ needs.meta.outputs.version }}"
          body_path: /tmp/release_body.md
          files: dist/*
          draft: false
          prerelease: false
          generate_release_notes: true
